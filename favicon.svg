<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Stick Bash">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cc4ff"/>
      <stop offset="1" stop-color="#2f7fed"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#a06a34"/>
      <stop offset="1" stop-color="#d2a36a"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <!-- the stick: dark outline, then wood fill -->
  <line x1="16" y1="50" x2="41" y2="23" stroke="#5e3c18" stroke-width="10" stroke-linecap="round"/>
  <line x1="16" y1="50" x2="41" y2="23" stroke="url(#wood)" stroke-width="6.5" stroke-linecap="round"/>
  <!-- BASH! star at the tip -->
  <path d="M44 12 l3.2 7.6 7.6 3.2 -7.6 3.2 -3.2 7.6 -3.2 -7.6 -7.6 -3.2 7.6 -3.2 z"
        fill="#ffd23f" stroke="#ff9a3b" stroke-width="2" stroke-linejoin="round"/>
  <!-- impact sparkles -->
  <circle cx="22" cy="19" r="2.2" fill="#fff8c8"/>
  <circle cx="52" cy="45" r="2.6" fill="#fff8c8"/>
</svg>
